services:
  backend:
    image: ghcr.io/anwar/backend:latest
    container_name: backend
    networks:
      - app-network
    depends_on:
      - db
    environment:
      - DB_HOST=db
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', res => process.exit(res.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      retries: 3
  frontend:
    build: ./frontend
    container_name: frontend
    networks:
      - app-network
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - app-network
  db:
    image: mongo:6
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
networks:
  app-network:
volumes:
  mongo-data:
